name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: listitup
          POSTGRES_PASSWORD: listitup
          POSTGRES_DB: listitup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U listitup -d listitup_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:v1.28
        ports:
          - 1025:1025
          - 8025:8025
    defaults:
      run:
        working-directory: client
    env:
      DATABASE_URL: postgresql://listitup:listitup@localhost:5432/listitup_test?schema=public
      REDIS_URL: redis://localhost:6379
      MAILPIT_API_URL: http://localhost:8025
      MAILPIT_SMTP_HOST: localhost
      MAILPIT_SMTP_PORT: "1025"
      BETTER_AUTH_SECRET: test-secret-with-at-least-32-characters
      BETTER_AUTH_URL: http://localhost:3000
      MAIL_PROVIDER: custom
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_USER: test
      SMTP_PASSWORD: test
      MAIL_FROM_NAME: ListItUp
      MAIL_FROM_EMAIL: no-reply@listitup.test
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma generate

      - run: pnpm run prisma:migrate

      - run: pnpm run lint

      - run: pnpm run typecheck

      - run: pnpm test

  docker-build:
    name: Docker production build
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - run: docker build --tag listitup:ci ./client
