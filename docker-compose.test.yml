services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: listitup
      POSTGRES_PASSWORD: listitup
      POSTGRES_DB: listitup_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listitup -d listitup_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.28
    ports:
      - "1025:1025"
      - "8025:8025"
